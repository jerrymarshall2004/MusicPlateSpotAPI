; ============================================================
;  Music Plate — ESP32 firmware
;  Build with PlatformIO (VS Code extension or `pio run`).
; ============================================================

[platformio]
default_envs = esp32dev

; ---- shared settings ----
[env]
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
; Larger app partition + a LittleFS partition for the web UI.
board_build.partitions = partitions.csv

; Default build compiles the full firmware but NOT the standalone NFC test.
build_src_filter = +<*> -<nfc_test.cpp>

lib_deps =
    bblanchon/ArduinoJson @ ^7.2.0
    adafruit/Adafruit PN532 @ ^1.3.4
    adafruit/Adafruit BusIO @ ^1.16.1
    ; Maintained async server forks (ESP32Async org).
    ; If the registry names don't resolve, use the git URLs in the comment below.
    ESP32Async/ESPAsyncWebServer @ ^3.6.0
    ESP32Async/AsyncTCP @ ^3.3.2
; Fallback if the registry names change:
;   https://github.com/ESP32Async/ESPAsyncWebServer.git
;   https://github.com/ESP32Async/AsyncTCP.git

build_flags =
    -DCORE_DEBUG_LEVEL=3            ; 0=none .. 5=verbose
    -DARDUINOJSON_ENABLE_STD_STRING=1

; ---- classic ESP32 DevKit (4MB flash) ----
[env:esp32dev]
platform = espressif32 @ ^6.9.0
board = esp32dev

; ---- ESP32-S3 (recommended: more RAM/flash, native USB) ----
; Uncomment to build for an S3 dev board instead.
;[env:esp32s3]
;platform = espressif32 @ ^6.9.0
;board = esp32-s3-devkitc-1
;build_flags = ${env.build_flags} -DBOARD_HAS_PSRAM

; ============================================================
;  NFC-ONLY TEST BUILD
;  Flash this to verify read/write with just the PN532 + a tag.
;  No Wi-Fi, no Spotify, no secrets.h required.
;    pio run -e nfctest -t upload
;    pio device monitor
; ============================================================
[env:nfctest]
extends = env:esp32dev
; Compile ONLY the NFC reader + the test sketch.
build_src_filter = +<NfcReader.cpp> +<nfc_test.cpp>
; Only the PN532 library is needed here.
lib_deps =
    adafruit/Adafruit PN532 @ ^1.3.4
    adafruit/Adafruit BusIO @ ^1.16.1
